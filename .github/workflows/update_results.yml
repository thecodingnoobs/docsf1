name: Update Race Results

on:
  schedule:
    # Friday 22:00 UTC — catches FP1/FP2 once those are wired into fetch_results.
    # Until then it's a no-op (find_pending_rounds returns empty), which is fine.
    - cron: '0 22 * * 5'
    # Saturday 22:00 UTC — catches sprint quali + sprint race (Sat-only sessions),
    # plus FP3 / qualifying once those are added. This is the missing leg that
    # made Miami's Sat sprint sit uningested until Sunday before today's fix.
    - cron: '0 22 * * 6'
    # Sunday 22:00 UTC — catches races that finish by ~20:00 UTC (European/Asian slots)
    - cron: '0 22 * * 0'
    # Monday 22:00 UTC — catches late Sunday night races (Americas) + data availability buffer
    - cron: '0 22 * * 1'
  workflow_dispatch:
    inputs:
      force_rounds:
        description: 'Comma-separated round numbers to re-pull (e.g. 1,2). Leave blank to update only pending rounds.'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-results:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch results from OpenF1
        env:
          FORCE_ROUNDS: ${{ inputs.force_rounds }}
        run: |
          if [ -n "$FORCE_ROUNDS" ]; then
            python scripts/fetch_results.py --force-rounds "$FORCE_ROUNDS"
          else
            python scripts/fetch_results.py
          fi

      - name: Update career wins in standings
        run: python scripts/update_standings.py

      - name: Commit and push if updated
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add f1_2026_results.json f1_2026_standings.json
          git diff --staged --quiet && echo "No changes." || (
            git commit -m "Auto-update results + career wins $(date -u '+%Y-%m-%d') [skip ci]"
            git push
          )
