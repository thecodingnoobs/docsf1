name: Update Race Results

on:
  schedule:
    # Sunday 22:00 UTC — catches races that finish by ~20:00 UTC (European/Asian slots)
    - cron: '0 22 * * 0'
    # Monday 22:00 UTC — catches late Sunday night races (Americas) + data availability buffer
    - cron: '0 22 * * 1'
  workflow_dispatch:
    # Allow manual trigger from the Actions tab any time

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-results:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch results from OpenF1
        run: python scripts/fetch_results.py

      - name: Commit and push if updated
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add f1_2026_results.json
          git diff --staged --quiet && echo "No changes." || (
            git commit -m "Auto-update race results $(date -u '+%Y-%m-%d') [skip ci]"
            git push
          )
