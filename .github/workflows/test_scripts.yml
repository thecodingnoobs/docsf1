name: Test & Validate Scripts

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'f1_2026_standings.json'
      - 'f1_2026_results.json'
      - '.github/workflows/test_scripts.yml'
  pull_request:
    paths:
      - 'scripts/**'
      - '.github/workflows/test_scripts.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        # fetch_results.py imports `requests` at module level, so importing
        # it from test_fetch_results.py needs the package installed even
        # though the unit tests don't make any network calls.
        run: pip install requests

      - name: Run unit tests
        run: |
          python scripts/test_update_standings.py -v
          python scripts/test_fetch_results.py -v

      - name: Validate standings JSON
        run: python scripts/validate_standings.py
